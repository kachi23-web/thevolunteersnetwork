<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Charitics - Making a Difference Together</title>
    <meta name="title" content="Charitics - Making a Difference Together" />
    <meta name="description" content="Join us in making a positive impact. Support our charitable causes, volunteer opportunities, and community initiatives." />
    <meta name="keywords" content="charity, donation, volunteer, NGO, nonprofit, community service, fundraising" />
    <meta name="author" content="Charitics" />
    <meta name="robots" content="index, follow" />
    
    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#ff5722" />
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Charitics - Making a Difference Together" />
    <meta property="og:description" content="Join us in making a positive impact. Support our charitable causes, volunteer opportunities, and community initiatives." />
    <meta property="og:image" content="/og-image.jpg" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Charitics - Making a Difference Together" />
    <meta name="twitter:description" content="Join us in making a positive impact. Support our charitable causes, volunteer opportunities, and community initiatives." />
    <meta name="twitter:image" content="/og-image.jpg" />
    
    <!-- Accessibility -->
    <meta name="color-scheme" content="light" />
    
    <!-- Critical Resource Hints for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    
    <!-- Preload critical fonts with high priority -->
    <link rel="preload" as="font" type="font/woff2" href="https://fonts.gstatic.com/s/manrope/v15/xn7_YHE41ni1AdIRqAuZuw1Bx9mbZk59FO_F87jxeN7B.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="https://fonts.gstatic.com/s/quicksand/v31/6xK-dSZaM9iE8KbpRA_LJ3z8mH9BOJvgkP8o58a-xDwxUD2GFw.woff2" crossorigin />
    
    <!-- Preload critical images for LCP optimization -->
    <link rel="preload" as="image" href="/assets/img/about-2-img.jpg" />
    <link rel="preload" as="image" href="/assets/img/banner-img.png" />
    <link rel="preload" as="image" href="/assets/img/logo.svg" />
    
    <!-- Preload critical CSS chunks -->
    <link rel="modulepreload" href="/src/main.tsx" />
    <link rel="modulepreload" href="/src/router.tsx" />
    <link rel="modulepreload" href="/src/pages/HomePage.tsx" />
    
    <!-- Critical CSS inlined for faster rendering -->
    <style>
      /* Critical CSS for above-the-fold content */
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        line-height: 1.6;
        color: #333;
        background-color: #fff;
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      #root {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        width: 100%;
      }
      
      /* Loading spinner for better perceived performance */
      .loading-spinner {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 40px;
        height: 40px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #ff5722;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        z-index: 9999;
      }
      
      @keyframes spin {
        0% { transform: translate(-50%, -50%) rotate(0deg); }
        100% { transform: translate(-50%, -50%) rotate(360deg); }
      }
      
      /* Hide spinner when app loads */
      .app-loaded .loading-spinner {
        display: none;
      }
      
      /* Critical header styles */
      .header {
        position: relative;
        z-index: 1000;
      }
      
      /* Critical button styles */
      .ul-btn {
        display: inline-flex;
        align-items: center;
        padding: 12px 24px;
        background: linear-gradient(135deg, #ff5722, #ff7043);
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 600;
        transition: transform 0.2s ease;
      }
      
      .ul-btn:hover {
        transform: translateY(-2px);
      }
    </style>
    
    <!-- Load fonts asynchronously after critical CSS -->
    <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Quicksand:wght@300..700&display=swap" />
    <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" />
    
    <!-- Fallback for browsers that don't support preload -->
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
      <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <!-- Loading indicator for better perceived performance -->
    <div class="loading-spinner" id="loading-spinner"></div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Hide loading spinner when app loads -->
    <script>
      window.addEventListener('load', function() {
        document.body.classList.add('app-loaded');
        const spinner = document.getElementById('loading-spinner');
        if (spinner) {
          spinner.style.display = 'none';
        }
      });
    </script>
    
    <!-- No-JS Fallback -->
    <noscript>
      <div style="padding: 2rem; text-align: center; font-family: system-ui, -apple-system, sans-serif;">
        <h1>JavaScript Required</h1>
        <p>This application requires JavaScript to be enabled. Please enable JavaScript in your browser settings to continue.</p>
      </div>
    </noscript>
  </body>
</html>
